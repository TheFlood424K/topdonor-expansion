name: Build TopDonor PlaceholderAPI Expansion

on:
  push:
    branches:
      - main
      - master
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      - name: Build with Maven
        run: mvn -B clean package

      - name: Upload compiled expansion jar
        uses: actions/upload-artifact@v4
        with:
          name: topdonor-expansion-jar
          path: |
            target/*topdonor-expansion*.jar
            target/*TopDonorExpansion*.jar